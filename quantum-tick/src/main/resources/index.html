<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>QuantumTick</h1>
    
    <h2 id="displayBox">Waiting for Java...</h2>

    <div class="btn-container">
        <button class="btn-start" onclick="javaApp.runTest()">Test Java Connection</button>
    </div>

    <script>
        function changeText(newText) {
            let box = document.getElementById("displayBox");
            box.innerText = newText;
            
            // Let's also make JS change the color to prove it worked!
            box.style.color = "#00ffcc"; 
        }
    </script>
</body>
</html>
